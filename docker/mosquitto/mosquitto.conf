# Mosquitto broker yapılandırması — geliştirme ortamı

# Düz MQTT — healthcheck ve yerel geliştirme için
listener 1883
protocol mqtt

# TLS MQTT — Docker servisler ve simülatör için
listener 8883
protocol mqtt
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
tls_version tlsv1.2

# Kimlik doğrulama — tüm listener'lara uygulanır
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl.conf

# Anonim bağlantıya izin yok
allow_anonymous false

# Kalıcılık
persistence true
persistence_location /mosquitto/data/

# Loglama
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
