# Mosquitto ACL — access control list
# This file is regenerated by the backend when devices are registered.
# Format: user <username> / topic <permission> <topic>

# Backend service has full farm-wide access
user backend
topic readwrite farms/#

# Device entries are added below by the regenerate_mosquitto_acl Celery task.

# Simülatör cihazları — Çiftlik 1
user device-sensor-001
topic write farms/3/devices/seed-sensor-001/telemetry
topic write farms/3/devices/seed-sensor-001/status
topic read  farms/3/devices/seed-sensor-001/commands

user device-sensor-002
topic write farms/3/devices/seed-sensor-002/telemetry
topic write farms/3/devices/seed-sensor-002/status
topic read  farms/3/devices/seed-sensor-002/commands

user device-valve-001
topic read  farms/3/devices/seed-valve-001/commands
topic write farms/3/devices/seed-valve-001/commands/ack
topic write farms/3/devices/seed-valve-001/status
