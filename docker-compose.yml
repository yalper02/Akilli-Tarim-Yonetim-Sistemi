services:

  # ── TimescaleDB (PostgreSQL + time-series extension) ────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-akilli_tarim}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-akilli_tarim}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis (Celery broker + Django cache) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mosquitto MQTT broker ────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./docker/mosquitto/acl.conf:/mosquitto/config/acl.conf:ro
      - ./docker/mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./docker/mosquitto/certs:/mosquitto/config/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "${MQTT_BROKER_PORT:-1883}:1883"
      - "${MQTT_TLS_PORT:-8883}:8883"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -u backend -P ${MQTT_BACKEND_PASSWORD:-change-me-backend-password} -t health/check -m ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Django web (REST API + WebSocket) ───────────────────────────────────────
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development

  # ── Celery worker (görev kuyruğu) ───────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config.celery worker -l info -c 2
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development

  # ── Celery Beat (periyodik görev zamanlayıcı) ────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development

  # ── MQTT Worker (sensör verisi ingest) ──────────────────────────────────────
  mqtt-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m apps.mqtt_worker.runner
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - ./docker/mosquitto/certs:/mosquitto/certs:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "8883"
      MQTT_TLS_CA_CERT: /mosquitto/certs/ca.crt

  # ── Sensör simülatörü ────────────────────────────────────────────────────────
  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./simulator:/app
      - ./docker/mosquitto/certs:/mosquitto/certs:ro
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "8883"
      MQTT_CA_CERT: /mosquitto/certs/ca.crt

volumes:
  db_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
